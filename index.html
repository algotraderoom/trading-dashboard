<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delta Trading</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<meta name="theme-color" content="#0b1220">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    background:radial-gradient(circle at top,#16213e,#0b1220 70%);
    color:white;

    font-family:Segoe UI,Arial,sans-serif;
}

.container{

    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{

    font-size:70px;
    margin-bottom:20px;

    animation:float 2.5s ease-in-out infinite;
}

.title{

    font-size:34px;
    font-weight:700;

    letter-spacing:5px;
}

.title span{

    color:#38bdf8;
}

.subtitle{

    margin-top:18px;

    color:#bfc7d5;

    font-size:16px;

    letter-spacing:1px;
}

.loader{

    display:flex;

    gap:12px;

    margin-top:45px;
}

.loader span{

    width:12px;
    height:12px;

    border-radius:50%;

    background:#38bdf8;

    animation:bounce 1s infinite;
}
.logo img{
    width:140px;
    height:auto;

    animation:float 2.5s ease-in-out infinite;
}
.loader span:nth-child(2){animation-delay:.15s;}
.loader span:nth-child(3){animation-delay:.30s;}
.loader span:nth-child(4){animation-delay:.45s;}
.loader span:nth-child(5){animation-delay:.60s;}

@keyframes bounce{

    0%,80%,100%{
        transform:scale(.4);
        opacity:.3;
    }

    40%{
        transform:scale(1.4);
        opacity:1;
    }
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}

.footer{

    position:absolute;

    bottom:30px;

    color:#7b8794;

    font-size:13px;

    letter-spacing:1px;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Delta Trading">
    </div>

    <div class="title">
        DELTA <span>TRADING</span>
    </div>

    <div class="subtitle">
        Loading Dashboard...
    </div>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<div class="footer">
    Delta Decipher Desk
</div>

<script>

function isMobile(){

    return (
        /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent)
        || window.innerWidth <= 768
    );
}

setTimeout(()=>{

    if(isMobile()){

        window.location.replace("Mobile.html");

    }else{

        window.location.replace("Desktop.html");

    }

},1200);

</script>

</body>
</html>
